  <text x="150" y="170" font-family="sans-serif" font-size="12" fill="#0077b6">Change %</text>
  <text x="150" y="195" font-family="sans-serif" font-size="18" fill="#e53935">-1.94%</text>
  <text x="280" y="170" font-family="sans-serif" font-size="12" fill="#0077b6">Sentiment</text>
  <text x="280" y="195" font-family="sans-serif" font-size="18" fill="#2a9d6a">Neutral +0.00</text>
  <!-- Tabs -->
  <text x="50" y="240" font-family="sans-serif" font-size="16" fill="#666" text-anchor="middle">Articles</text>
  <text x="170" y="240" font-family="sans-serif" font-size="16" font-weight="bold" fill="#c8a84e" text-anchor="middle">Metrics</text>
  <line x1="140" y1="248" x2="200" y2="248" stroke="#c8a84e" stroke-width="3"/>
  <text x="300" y="240" font-family="sans-serif" font-size="16" fill="#666" text-anchor="middle">Articles</text>
  <line x1="15" y1="255" x2="375" y2="255" stroke="#ddd" stroke-width="1"/>
  <!-- Metric sections -->
  <rect x="15" y="280" width="360" height="55" rx="12" fill="white"/>
  <text x="30" y="313" font-family="sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Summary</text>
  <text x="350" y="313" font-family="sans-serif" font-size="18" fill="#999" text-anchor="end">v</text>

  <rect x="15" y="350" width="360" height="55" rx="12" fill="white"/>
  <text x="30" y="383" font-family="sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Basic Metadata</text>
  <text x="350" y="383" font-family="sans-serif" font-size="18" fill="#999" text-anchor="end">v</text>

  <rect x="15" y="420" width="360" height="55" rx="12" fill="white"/>
  <text x="30" y="453" font-family="sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Latest Bar (Price &amp; Market Data)</text>
  <text x="350" y="453" font-family="sans-serif" font-size="18" fill="#999" text-anchor="end">v</text>

  <rect x="15" y="490" width="360" height="55" rx="12" fill="white"/>
  <text x="30" y="523" font-family="sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Derived Price Metrics</text>
  <text x="350" y="523" font-family="sans-serif" font-size="18" fill="#999" text-anchor="end">v</text>

  <rect x="15" y="560" width="360" height="55" rx="12" fill="white"/>
  <text x="30" y="593" font-family="sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Trend Indicators (Moving Avg)</text>
  <text x="350" y="593" font-family="sans-serif" font-size="18" fill="#999" text-anchor="end">v</text>

  <rect x="15" y="630" width="360" height="55" rx="12" fill="white"/>
  <text x="30" y="663" font-family="sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Momentum Oscillators</text>
  <text x="350" y="663" font-family="sans-serif" font-size="18" fill="#999" text-anchor="end">v</text>

