<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <rect width="390" height="844" fill="#f5f0e8"/>
  <!-- Back arrow -->
  <text x="20" y="50" font-family="sans-serif" font-size="24" fill="#333">&lt;-</text>
  <!-- Company header -->
  <rect x="20" y="70" width="60" height="60" rx="12" fill="#76b900"/>
  <text x="50" y="107" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">NVIDIA</text>
  <text x="95" y="95" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">NVIDIA</text>
  <text x="95" y="118" font-family="sans-serif" font-size="14" fill="#666">NVDA</text>
  <rect x="260" y="80" width="100" height="32" rx="16" fill="none" stroke="#c8a84e" stroke-width="2"/>
  <text x="310" y="101" font-family="sans-serif" font-size="14" fill="#c8a84e" text-anchor="middle">Following</text>
  <!-- Price info -->
  <text x="20" y="170" font-family="sans-serif" font-size="12" fill="#0077b6">Price</text>
